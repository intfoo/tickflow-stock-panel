name: Build and Push Docker Image

# 触发:
#   - push 到 main: 覆盖刷新 :latest + :sha(每次提交可追溯)
#   - 打 v* tag:    额外产出带版本号的镜像(如 :v0.1.43), 便于固定回溯
#   - 手动:         网页 Actions → Run workflow
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=match,pattern=v*,group=0

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # GitHub runner 在海外, 关掉国内镜像源(USE_CN_MIRROR=0)
          # 让构建直连官方 npm/PyPI, 反而更快更稳;
          # 本地/国内手动 docker build 仍走 Dockerfile 默认的 CN 镜像。
          build-args: |
            USE_CN_MIRROR=0
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      # ==========  SSH 部署到服务器 ==========
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        # 在 step 级别定义环境变量，将 Secrets 映射过来
        env:
          REGISTRY_URL: ${{ env.REGISTRY }}
          REG_USER: ${{ github.actor }}
          REG_PASS: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ vars.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          # 使用 envs 将上面的环境变量安全传递到远程 SSH 脚本中
          envs: REGISTRY_URL,REG_USER,REG_PASS
          script: |
            # 1. 开启严格模式：遇到错误立即退出，防止 pull 失败仍执行 up
            set -e
            set -o pipefail

            cd /app/tickflow-stock-panel

            echo "::group::🔐 1. 登录镜像仓库"
            # 增加非空检查，如果 Secret 没配置，直接明确报错
            if [ -z "$REG_USER" ] || [ -z "$REG_PASS" ]; then
              echo "❌ 致命错误：REGISTRY_USERNAME 或 REGISTRY_PASSWORD 未在 GitHub Secrets 中配置，或值为空！"
              exit 1
            fi

            if [ -z "$REGISTRY_URL" ]; then
              echo "❌ 致命错误：env.REGISTRY 未配置！"
              exit 1
            fi

            # 在脚本中使用 $REG_USER 等环境变量
            podman login "$REGISTRY_URL" -u "$REG_USER" -p "$REG_PASS"
            echo "::endgroup::"

            echo "::group::🛑 2. 停止并清理旧服务"
            # down 会停止容器、删除网络和 Pod（如果用了 --pod）
            # --remove-orphans 清理 compose 文件中已删除的服务
            podman-compose down --remove-orphans || true
            echo "::endgroup::"

            echo "::group::📦 3. 拉取最新镜像"
            podman-compose pull
            echo "::endgroup::"

            echo "::group::🚀 4. 启动新服务 (Pod 模式)"
            # --pod 参数让所有服务运行在同一个 Pod 中，共享网络
            podman-compose --pod up -d --remove-orphans
            echo "::endgroup::"

            echo "::group::🧹 5. 清理悬空镜像 (释放磁盘空间)"
            # 每次 pull 新镜像后，旧镜像会变成 <none>，定期清理防止磁盘爆满
            podman image prune -f
            echo "::endgroup::"

            echo "::group::📊 6. 验证部署状态"
            # 等待容器完全启动（特别是数据库等需要初始化的服务）
            sleep 5
            
            echo "=== Pod 状态 ==="
            podman pod ps
            
            echo ""
            echo "=== Compose 服务状态 ==="
            podman-compose ps
            
            echo ""
            echo "=== 容器详细状态 ==="
            # 修正：直接查看所有运行中的容器，或者用 label 过滤
            podman ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            
            echo ""
            echo "=== 最近 20 行日志 ==="
            podman-compose logs --tail=20
            echo "::endgroup::"

            echo "✅ 部署脚本执行完毕！"
